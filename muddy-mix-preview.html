<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: system-ui, sans-serif; }
    .card { background: white; border-radius: 16px; padding: 40px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .label { font-size: 11px; font-weight: 900; letter-spacing: 0.12em; color: #111827; text-align: center; }
    .caption { font-size: 13px; color: #6b7280; text-align: center; line-height: 1.5; max-width: 200px; }
  </style>
</head>
<body>
  <div class="card">
    <svg viewBox="0 0 80 80" width="120" height="120">
      <!-- Three overlapping circles — tangled ownership, unclear boundaries -->
      <circle cx="28" cy="33" r="20" fill="#ef4444" opacity="0.2"/>
      <circle cx="52" cy="33" r="20" fill="#ef4444" opacity="0.2"/>
      <circle cx="40" cy="52" r="20" fill="#ef4444" opacity="0.2"/>
      <circle cx="28" cy="33" r="20" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="52" cy="33" r="20" fill="none" stroke="#ef4444" stroke-width="1.5"/>
      <circle cx="40" cy="52" r="20" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    </svg>
    <div class="label">THE MUDDY MIX</div>
    <div class="caption">Tools added for good reasons. Nobody owned how they relate.</div>
  </div>
</body>
</html>
